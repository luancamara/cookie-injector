<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px -apple-system, sans-serif; width: 460px; padding: 10px; }
    h3 { margin: 0 0 6px; font-size: 13px; }
    textarea {
      width: 100%; height: 160px; box-sizing: border-box;
      font: 11px ui-monospace, monospace; white-space: pre; tab-size: 4;
    }
    .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    button { padding: 6px 14px; font-size: 13px; cursor: pointer; }
    #inject { font-weight: 600; }
    ul { list-style: none; padding-left: 0; margin: 8px 0 0; max-height: 220px; overflow: auto; }
    li { margin: 2px 0; word-break: break-all; }
    .ok { color: #1a7f37; }
    .err { color: #cf222e; }
    .warn { color: #9a6700; }
    .muted { color: #57606a; }
    hr { border: none; border-top: 1px solid #d0d7de; margin: 14px 0; }
    input[type=text] { width: 100%; box-sizing: border-box; font: 12px ui-monospace, monospace; padding: 5px; }
    label.chk { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .ver { float: right; font-size: 11px; color: #57606a; font-weight: 400; }
  </style>
</head>
<body>
  <h3>Ler / exportar cookies deste perfil <span id="version" class="ver"></span></h3>
  <input id="domains" type="text" placeholder="domínios separados por vírgula (ex.: google.com, atlassian.net)">
  <div class="row">
    <button id="list">Listar cookies</button>
    <button id="export">Exportar JSON</button>
    <button id="delete">Excluir cookies</button>
    <label class="chk"><input type="checkbox" id="showValues"> mostrar valores</label>
    <span id="readStatus" class="muted"></span>
  </div>
  <ul id="readLog"></ul>
  <textarea id="exported" placeholder="O JSON exportado aparece aqui (pronto para colar abaixo e injetar em outro perfil)." style="height: 120px;"></textarea>

  <hr>

  <h3>Cole os cookies (copie direto da aba Application → Cookies do DevTools)</h3>
  <textarea id="raw" placeholder="nome&#9;valor&#9;domínio&#9;path&#9;expira&#9;tamanho&#9;HttpOnly&#9;Secure&#9;SameSite&#9;...&#10;Cole aqui — uma linha por cookie (separado por TAB)."></textarea>
  <div class="row">
    <button id="pasteInject">Colar e injetar</button>
    <button id="inject">Injetar agora</button>
    <button id="parse">Só pré-visualizar</button>
    <button id="clear">Limpar</button>
    <span id="status" class="muted"></span>
  </div>
  <ul id="log"></ul>
  <script src="popup.js"></script>
</body>
</html>
